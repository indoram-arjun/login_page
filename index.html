<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2f2f2;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Login</h2>

        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="msg"></p>

    </div>

    <script>

        function login() {

            let username = document.getElementById("user").value;
            let password = document.getElementById("pass").value;

            if (username == "admin" && password == "1234") {
                document.getElementById("msg").innerText = "Welcome Admin";
            }
            else {
                document.getElementById("msg").innerText = "Wrong Login";
            }

        }

    </script>

</body>

</html>
